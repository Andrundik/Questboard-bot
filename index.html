<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Board</title>
    <!-- Подключаем Telegram Web Apps SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <h1>Quest Board</h1>
    
    <button onclick="sendQuest('Квест: Собрать 10 монет')">Собрать 10 монет</button>
    <button onclick="sendQuest('Квест: Посетить магазин')">Посетить магазин</button>

    <script>
        function sendQuest(questName) {
            let tg = window.Telegram.WebApp;
            tg.sendData(questName);
        }
    </script>
</body>
</html>
