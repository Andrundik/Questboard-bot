<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Board</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Стили, которые мы добавили */
        body { font-family: sans-serif; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 20px; text-align: center; }
        .quest-card { background-color: var(--tg-theme-secondary-bg-color); padding: 15px; margin: 10px 0; border-radius: 12px; }
        button { background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        body {
    max-width: 500px; /* Сайт будет шириной как телефон */
    margin: 0 auto;   /* Центрируем сайт по экрану */
    font-family: sans-serif;
    background-color: var(--tg-theme-bg-color);
    color: var(--tg-theme-text-color);
    padding: 20px;
    text-align: center;
}
    </style>
</head>
<body>
    <h1>Quest Board</h1>

    <div class="quest-card">
        <h3>💰 Сбор монет</h3>
        <p>Собери 10 монет в лесу</p>
        <button onclick="sendQuest('Квест: Собрать монеты')">Выполнить</button>
    </div>

    <div class="quest-card">
        <h3>⚔️ Охота на монстра</h3>
        <p>Победи пещерного тролля</p>
        <button onclick="sendQuest('Квест: Охота на тролля')">Выполнить</button>
    </div>
<script>
    function sendQuest(questName) {
        // Добавим проверку, чтобы понять, видит ли скрипт Telegram
        if (window.Telegram && window.Telegram.WebApp) {
            let tg = window.Telegram.WebApp;
            tg.sendData(questName);
            alert("Отправляю: " + questName); // Убери это, когда заработает
        } else {
            alert("напиши @andrundik1 бурмалда");
        }
    }
</script>
</body>
</html>
